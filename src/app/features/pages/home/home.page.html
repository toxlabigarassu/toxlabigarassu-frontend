<div class="page-shell">
  <app-site-header
    [title]="company.title"
    [subtitle]="company.subtitle"
    [navItems]="template.navigation"
    [whatsappLink]="company.whatsappLink"
  />

  <main>
    <app-hero-carousel
      [slides]="template.heroSlides"
      [whatsappLink]="company.whatsappLink"
    />
    <app-feature-cards [cards]="template.featureCards" />
    <app-law-cards [cards]="template.lawCards" />
    <app-exam-highlights
      [highlights]="template.examHighlights"
      [whatsappLink]="company.whatsappLink"
    />
    <app-location-section
      [whatsappLink]="company.whatsappLink"
      [mapEmbedUrl]="company.mapEmbedUrl"
    />
  </main>

  <app-site-footer
    [title]="company.title"
    [subtitle]="company.subtitle"
    [phone]="company.phone"
    [email]="company.email"
    [instagramHandle]="company.instagramHandle"
    [instagramLink]="company.instagramLink"
    [whatsappLink]="company.whatsappLink"
    [businessHours]="company.businessHours"
    [addressLines]="company.addressLines"
  />

  <div class="floating-actions">
    <a
      class="floating-social floating-social--instagram"
      [href]="company.instagramLink"
      target="_blank"
      rel="noopener"
      aria-label="Abrir Instagram"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M7.75 2h8.5A5.76 5.76 0 0 1 22 7.75v8.5A5.76 5.76 0 0 1 16.25 22h-8.5A5.76 5.76 0 0 1 2 16.25v-8.5A5.76 5.76 0 0 1 7.75 2Zm0 1.8A3.96 3.96 0 0 0 3.8 7.75v8.5a3.96 3.96 0 0 0 3.95 3.95h8.5a3.96 3.96 0 0 0 3.95-3.95v-8.5a3.96 3.96 0 0 0-3.95-3.95h-8.5Zm8.95 1.35a1.15 1.15 0 1 1 0 2.3 1.15 1.15 0 0 1 0-2.3ZM12 6.85A5.15 5.15 0 1 1 6.85 12 5.16 5.16 0 0 1 12 6.85Zm0 1.8A3.35 3.35 0 1 0 15.35 12 3.35 3.35 0 0 0 12 8.65Z"
        />
      </svg>
    </a>

    <a
      class="floating-cta"
      [href]="company.whatsappLink"
      target="_blank"
      rel="noopener"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M19.05 4.91A9.82 9.82 0 0 0 12.03 2c-5.46 0-9.9 4.44-9.9 9.9 0 1.74.45 3.44 1.3 4.94L2 22l5.31-1.39a9.86 9.86 0 0 0 4.72 1.2h.01c5.46 0 9.9-4.44 9.9-9.9a9.85 9.85 0 0 0-2.89-7ZM12.04 20.14h-.01a8.2 8.2 0 0 1-4.18-1.14l-.3-.18-3.15.82.84-3.07-.2-.31a8.2 8.2 0 0 1-1.26-4.36c0-4.53 3.69-8.22 8.23-8.22 2.19 0 4.25.85 5.8 2.41a8.15 8.15 0 0 1 2.41 5.81c0 4.53-3.69 8.22-8.22 8.22Zm4.51-6.16c-.25-.13-1.47-.73-1.7-.81-.23-.08-.39-.12-.56.12-.16.25-.64.81-.78.97-.14.17-.28.19-.53.06-.25-.12-1.03-.38-1.97-1.22-.73-.65-1.22-1.46-1.37-1.7-.14-.25-.01-.38.11-.5.11-.11.25-.28.37-.42.12-.14.16-.25.25-.42.08-.17.04-.31-.02-.44-.06-.12-.56-1.35-.77-1.85-.2-.48-.4-.42-.56-.43h-.48c-.17 0-.44.06-.67.31-.23.25-.88.86-.88 2.09s.9 2.43 1.03 2.6c.12.16 1.77 2.7 4.28 3.79.6.26 1.07.42 1.43.53.6.19 1.14.16 1.57.1.48-.07 1.47-.6 1.68-1.18.2-.58.2-1.08.14-1.18-.05-.11-.22-.17-.47-.3Z"
        />
      </svg>
      Preço Promocional! Fale Conosco!
    </a>
  </div>
</div>
