<section class="hero-section" id="inicio">
  <div class="hero-backdrop" aria-hidden="true">
    <div class="hero-glow hero-glow--one"></div>
    <div class="hero-glow hero-glow--two"></div>
  </div>

  <div class="hero-panel">
    <article
      class="carousel-card"
      aria-label="Carrossel de públicos principais"
      [class.is-dragging]="dragOffset !== 0"
      (pointerdown)="onPointerDown($event)"
      (pointermove)="onPointerMove($event)"
      (pointerup)="onPointerUp($event)"
      (pointerleave)="onPointerCancel()"
      (pointercancel)="onPointerCancel()"
    >
      <button
        class="carousel-arrow carousel-arrow--left"
        type="button"
        aria-label="Slide anterior"
        (click)="previousSlide()"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 6 9 12l6 6" />
        </svg>
      </button>

      <button
        class="carousel-arrow carousel-arrow--right"
        type="button"
        aria-label="Próximo slide"
        (click)="nextSlide()"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m9 6 6 6-6 6" />
        </svg>
      </button>

      <div class="viewport">
        <div
          class="carousel-body"
          [class.carousel-body--transition]="
            isTrackTransitionEnabled && !isDragging
          "
          [style.transform]="trackTransform"
          (transitionend)="onTrackTransitionEnd()"
        >
          @for (slide of renderedSlides; track $index) {
            <section class="carousel-slide" aria-roledescription="slide">
              <div class="carousel-status">
                <span>{{ slide.eyebrow }}</span>
              </div>

              <div class="carousel-content">
                <h1>{{ slide.title }}</h1>
                <p class="hero-description">
                  {{ slide.description }}
                </p>
              </div>

              <div class="carousel-stats">
                @for (stat of slide.stats; track stat) {
                  <span>{{ stat }}</span>
                }
              </div>
            </section>
          }
        </div>
      </div>

      <div class="carousel-dots">
        @for (slide of slides; track slide.title; let i = $index) {
          <button
            type="button"
            [class.is-active]="i === currentSlide"
            [attr.aria-label]="'Ir para slide ' + (i + 1)"
            (click)="selectSlide(i)"
          ></button>
        }
      </div>
    </article>

    <div class="hero-actions">
      <a
        class="primary-button"
        [href]="whatsappLink"
        target="_blank"
        rel="noopener"
      >
        Garantir Preço Promocional
      </a>
      <a
        class="secondary-button"
        [href]="whatsappLink"
        target="_blank"
        rel="noopener"
      >
        Falar sobre meu exame
      </a>
    </div>
  </div>
</section>
